<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Pagina no encontrada | Kropia</title>
    <style>
      :root {
        color: #1e2a1f;
        background: #f6f8f2;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(640px, calc(100% - 40px));
      }

      p:first-child {
        color: #206223;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 12px 0 16px;
        font-size: clamp(2.2rem, 8vw, 4rem);
        line-height: 1;
      }

      p {
        line-height: 1.65;
      }

      a {
        color: #206223;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Error 404</p>
      <h1>Pagina no encontrada</h1>
      <p>La direccion que ha abierto no existe o ya no esta disponible.</p>
      <p>The address you opened does not exist or is no longer available.</p>
      <p><a href="/">Volver al inicio</a> | <a href="/en">Back to home</a></p>
    </main>
  </body>
</html>
