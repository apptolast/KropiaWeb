<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Página no encontrada | Kropia</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f8ef;
        color: #1a1c1a;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(92vw, 620px);
        border-radius: 28px;
        background: #ffffff;
        padding: 40px;
        box-shadow: 0 24px 60px rgba(32, 98, 35, 0.12);
        text-align: center;
      }
      h1 {
        margin: 0;
        color: #206223;
        font-size: clamp(2rem, 8vw, 4rem);
      }
      p {
        color: #40493d;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        margin-top: 12px;
        border-radius: 999px;
        background: #206223;
        color: #ffffff;
        font-weight: 800;
        padding: 0 22px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>La página que buscas no existe o ha cambiado de dirección.</p>
